<html>
<head>
    <meta charset="UTF-8">
    <title>Select Message</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <h1>Available Messages</h1>
    <a href="/" class="back-btn bottom-left">Main Menu</a>
    <div class="select-container">

        <div class="select-column">
            <h3>Available Messages</h3>

            <select id="available" class="select-box" multiple>
            {% for file in files %}
                <option value="{{file.filename}}">
                    {{file.modified}} | {{ "%.1f"|format(file.duration) }} sec
                </option>
            {% endfor %}
            </select>
        </div>

        <div class="select-column">
            <h3>Selected Order</h3>
            <select id="selected" class="select-box" multiple></select>
        </div>
    </div>

    <button class="create-btn" onclick="create()">Create</button>
    <script>

        const available = document.getElementById("available")
        const selected = document.getElementById("selected")

        available.ondblclick = () => {
            const option = available.selectedOptions[0]
            if(option) selected.appendChild(option)
        }

        selected.ondblclick = () => {
            const option = selected.selectedOptions[0]
            if(option) available.appendChild(option)
        }

        function create(){

            const order = []

            if (selected.options.length === 0){
                alert("Please select at least one message.")
                return
            }

            for(let option of selected.options){
                order.push(option.value)
            }

            fetch("/create_sequence",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({order})
            })

        }

    </script>
</body>
</html>
